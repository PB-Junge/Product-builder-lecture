<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle">🌙</button>
    
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div class="numbers-container">
        </div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <!-- Partnership Inquiry Form -->
    <div class="form-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/mgopydpv" method="POST">
            <div class="form-group">
                <label for="email">이메일 주소</label>
                <input type="email" id="email" name="email" placeholder="example@email.com" required>
            </div>
            <div class="form-group">
                <label for="message">문의 내용</label>
                <textarea id="message" name="message" placeholder="제휴 관련 내용을 입력해주세요." required></textarea>
            </div>
            <button type="submit" class="submit-btn">문의하기</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
